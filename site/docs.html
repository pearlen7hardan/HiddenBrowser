<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="docs-data.js"></script>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #0a0c11; color: #ecedf3; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: #a78bfa; text-decoration: none; }
  a:hover { color: #c4b5fd; text-decoration: underline; }
  ::selection { background: #7c3aed55; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #232734; border-radius: 6px; border: 2px solid #0a0c11; }
  ::-webkit-scrollbar-thumb:hover { background: #2d3242; }

  /* rendered markdown */
  .md-body { color: #c8cdda; font-size: 15.5px; line-height: 1.72; }
  .md-body > *:first-child { margin-top: 0; }
  .md-body h1 { font-size: 38px; line-height: 1.15; letter-spacing: -0.03em; font-weight: 800; color: #ecedf3; margin: 0 0 28px; }
  .md-body h2 { font-size: 25px; letter-spacing: -0.02em; font-weight: 700; color: #ecedf3; margin: 52px 0 18px; padding-top: 20px; border-top: 1px solid #232734; scroll-margin-top: 90px; }
  .md-body h3 { font-size: 19px; font-weight: 600; color: #ecedf3; margin: 34px 0 14px; scroll-margin-top: 90px; }
  .md-body p { margin: 16px 0; }
  .md-body a { color: #a78bfa; font-weight: 500; }
  .md-body strong { color: #ecedf3; font-weight: 600; }
  .md-body ul, .md-body ol { padding-left: 22px; margin: 16px 0; }
  .md-body li { margin: 7px 0; }
  .md-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.86em; background: #181c26; border: 1px solid #232734; border-radius: 5px; padding: 2px 6px; color: #d8b4fe; }
  .md-body pre { background: #0d0f15; border: 1px solid #232734; border-radius: 10px; padding: 18px 20px; overflow-x: auto; margin: 20px 0; }
  .md-body pre code { background: none; border: none; padding: 0; color: #c8cdda; font-size: 13px; line-height: 1.6; white-space: pre; }
  .md-body img { max-width: 100%; height: auto; border: 1px solid #232734; border-radius: 10px; margin: 8px 0; display: block; }
  .md-body figure { margin: 24px 0; }
  .md-body figcaption { font-size: 13px; color: #767c8e; margin-top: 8px; }
  .md-body blockquote { margin: 20px 0; padding: 14px 20px; border-left: 3px solid #7c3aed; background: #12101d; border-radius: 0 8px 8px 0; color: #a6acbc; }
  .md-body blockquote p { margin: 6px 0; }
  .md-body table { border-collapse: collapse; width: 100%; margin: 20px 0; font-size: 14px; }
  .md-body th, .md-body td { border: 1px solid #232734; padding: 10px 14px; text-align: left; }
  .md-body th { background: #12141c; color: #ecedf3; font-weight: 600; }
  .md-body hr { border: none; border-top: 1px solid #232734; margin: 36px 0; }
  .callout { margin: 22px 0; padding: 16px 18px 16px 46px; border-radius: 10px; border: 1px solid; position: relative; font-size: 14.5px; }
  .callout > *:first-child { margin-top: 0; } .callout > *:last-child { margin-bottom: 0; }
  .callout::before { position: absolute; left: 16px; top: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .callout-info, .callout-tip { background: #12101d; border-color: #7c3aed44; color: #c4b5fd; }
  .callout-info::before, .callout-tip::before { content: 'ℹ'; color: #a78bfa; }
  .callout-warning { background: #1c160a; border-color: #fbbf2444; color: #fde68a; } .callout-warning::before { content: '⚠'; color: #fbbf24; }
  .callout-danger { background: #1c0d10; border-color: #fb718544; color: #fda4af; } .callout-danger::before { content: '⚠'; color: #fb7185; }
  .callout-success { background: #0c1a12; border-color: #4ade8044; color: #86efac; } .callout-success::before { content: '✓'; color: #4ade80; }
  .callout a { color: inherit; text-decoration: underline; }
  details.schema { margin: 20px 0; border: 1px solid #232734; border-radius: 10px; background: #0d0f15; overflow: hidden; }
  details.schema summary { cursor: pointer; padding: 13px 18px; font-size: 13px; font-weight: 600; color: #a6acbc; font-family: 'JetBrains Mono', monospace; list-style: none; display: flex; align-items: center; gap: 8px; }
  details.schema summary::-webkit-details-marker { display: none; }
  details.schema summary::before { content: '▸'; color: #7c3aed; transition: transform 150ms; }
  details.schema[open] summary::before { transform: rotate(90deg); }
  details.schema summary:hover { color: #ecedf3; }
  details.schema pre { margin: 0; border: none; border-top: 1px solid #232734; border-radius: 0; max-height: 420px; }
  @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition: none !important; } }
</style>
</helmet>
<div style="min-height:100vh;">

  <!-- top nav -->
  <header style="position:sticky; top:0; z-index:50; backdrop-filter:blur(14px); background:#0a0c11cc; border-bottom:1px solid #232734;">
    <div style="display:flex; align-items:center; gap:24px; padding:14px 28px;">
      <a href="index.html" style="display:flex; align-items:center; gap:10px; color:#ecedf3; font-weight:700; font-size:17px; letter-spacing:-0.02em;">
        <svg width="24" height="24" viewBox="0 0 22 22" style="filter:drop-shadow(0 0 8px #8b5cf640);"><defs><linearGradient id="dg1" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><path d="M11 1L21 11L11 21L1 11Z" fill="url(#dg1)"/><path d="M11 6L16 11L11 16L6 11Z" fill="#0a0c11"/></svg>
        HiddenBrowser
      </a>
      <span style="font-size:13px; color:#4f5566; font-weight:600; padding:3px 9px; border:1px solid #232734; border-radius:6px;">Docs</span>
      <div style="margin-left:auto; display:flex; align-items:center; gap:16px;">
        <div style="position:relative;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#767c8e" stroke-width="2" style="position:absolute; left:11px; top:50%; transform:translateY(-50%);"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input value="{{ q }}" onInput="{{ onSearch }}" placeholder="Search docs…" style="width:220px; background:#11141c; border:1px solid #232734; border-radius:8px; padding:8px 12px 8px 34px; color:#ecedf3; font-size:13.5px; font-family:inherit; outline:none;" style-focus="border-color:#7c3aed;">
        </div>
        <a href="index.html" style="font-size:14px; color:#a6acbc;" style-hover="color:#ecedf3;">Home</a>
        <a href="https://github.com/pearlen7hardan/HiddenBrowser" style="font-size:14px; color:#a6acbc;" style-hover="color:#ecedf3;">GitHub</a>
      </div>
    </div>
  </header>

  <div style="display:grid; grid-template-columns:270px minmax(0,1fr) 220px; max-width:1440px; margin:0 auto; align-items:start;">

    <!-- sidebar -->
    <aside style="position:sticky; top:57px; height:calc(100vh - 57px); overflow-y:auto; padding:32px 20px 60px; border-right:1px solid #232734;">
      <sc-for list="{{ groups }}" as="grp" hint-placeholder-count="2">
        <div style="margin-bottom:28px;">
          <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#767c8e; margin:0 0 10px 12px;">{{ grp.title }}</div>
          <sc-for list="{{ grp.items }}" as="it" hint-placeholder-count="4">
            <a href="{{ it.href }}" onClick="{{ it.onClick }}" style="{{ it.style }}">{{ it.label }}</a>
          </sc-for>
        </div>
      </sc-for>
    </aside>

    <!-- content -->
    <main style="padding:44px 56px 120px; min-height:100vh;">
      <div style="font-size:13px; color:#767c8e; margin-bottom:18px;">{{ crumb }}</div>
      <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
        <div style="color:#767c8e; font-size:15px; padding:40px 0;">Loading…</div>
      </sc-if>
      {{ contentEl }}
      <div style="display:flex; justify-content:space-between; gap:16px; margin-top:64px; padding-top:28px; border-top:1px solid #232734;">
        <sc-if value="{{ prev }}" hint-placeholder-val="{{ true }}">
          <a href="{{ prev.href }}" onClick="{{ prev.onClick }}" style="flex:1; border:1px solid #232734; border-radius:10px; padding:16px 20px; text-decoration:none; color:#ecedf3;" style-hover="border-color:#7c3aed;">
            <div style="font-size:12px; color:#767c8e; margin-bottom:4px;">← Previous</div>
            <div style="font-size:15px; font-weight:600;">{{ prev.label }}</div>
          </a>
        </sc-if>
        <sc-if value="{{ next }}" hint-placeholder-val="{{ true }}">
          <a href="{{ next.href }}" onClick="{{ next.onClick }}" style="flex:1; border:1px solid #232734; border-radius:10px; padding:16px 20px; text-decoration:none; color:#ecedf3; text-align:right;" style-hover="border-color:#7c3aed;">
            <div style="font-size:12px; color:#767c8e; margin-bottom:4px;">Next →</div>
            <div style="font-size:15px; font-weight:600;">{{ next.label }}</div>
          </a>
        </sc-if>
      </div>
    </main>

    <!-- on this page -->
    <aside style="position:sticky; top:57px; height:calc(100vh - 57px); overflow-y:auto; padding:44px 24px 60px;">
      <sc-if value="{{ hasToc }}" hint-placeholder-val="{{ true }}">
        <div>
          <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#767c8e; margin-bottom:12px;">On this page</div>
          <sc-for list="{{ toc }}" as="t" hint-placeholder-count="4">
            <a href="{{ t.href }}" onClick="{{ t.onClick }}" style="{{ t.style }}">{{ t.text }}</a>
          </sc-for>
        </div>
      </sc-if>
    </aside>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { current: null, html: '', toc: [], loading: true, q: '' };

  componentDidMount() {
    const first = this.tree()[0].items[0];
    this.loadPage(first);
  }

  tree() {
    return [
      { title: 'Usage Instructions', items: [
        { label: 'Install & first launch', path: 'usage-instructions/hiddenbrowser-browser.md' },
        { label: 'Proxy clients — macOS', path: 'usage-instructions/macos.md' },
        { label: 'Proxy clients — Windows', path: 'usage-instructions/windows.md' }
      ]},
      { title: 'Automation API', items: [
        { label: 'Authentication', path: 'hiddenbrowser-launcher-api/authentication.md' },
        { label: 'Binding & lifecycle', path: 'hiddenbrowser-launcher-api/binding-and-lifecycle.md' },
        { label: 'Typical flow', path: 'hiddenbrowser-launcher-api/typical-flow.md' },
        { label: 'Profiles', path: 'hiddenbrowser-launcher-api/profiles.md' },
        { label: 'Temporary profiles', path: 'hiddenbrowser-launcher-api/temporary-profiles.md' },
        { label: 'Fingerprints', path: 'hiddenbrowser-launcher-api/fingerprints.md' },
        { label: 'Fingerprint object', path: 'hiddenbrowser-launcher-api/fingerprint-object.md' },
        { label: 'Proxies', path: 'hiddenbrowser-launcher-api/proxies.md' },
        { label: 'Proxies, QUIC & WebRTC', path: 'hiddenbrowser-launcher-api/proxies-and-quic-webrtc.md' },
        { label: 'Models', path: 'hiddenbrowser-launcher-api/models.md' },
        { label: 'System', path: 'hiddenbrowser-launcher-api/system.md' },
        { label: 'MCP server', path: 'hiddenbrowser-launcher-api/mcp-server.md' }
      ]}
    ];
  }

  flat() { return this.tree().flatMap(g => g.items); }

  ensureMarked() {
    return new Promise(res => {
      const check = () => { if (window.marked) { window.marked.setOptions({ gfm: true, breaks: true }); res(); } else setTimeout(check, 40); };
      check();
    });
  }

  esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  decode(s) { const ta = document.createElement('textarea'); ta.innerHTML = s; return ta.value; }
  slug(s) { return s.toLowerCase().replace(/<[^>]+>/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

  preprocess(mdRaw, item) {
    const dir = item.path.split('/')[0];
    let md = mdRaw;
    md = md.replace(/src="images\//g, 'src="assets/docs/' + dir + '/images/');
    md = md.replace(/<mark[^>]*>/g, '').replace(/<\/mark>/g, '');
    md = md.replace(/&#x20;/g, ' ');
    md = md.replace(/<(https?:\/\/[^>\s]+)>/g, '[$1]($1)');
    md = md.replace(/{%\s*embed url="([^"]+)"\s*%}/g, '\n\n[$1]($1)\n\n').replace(/{%\s*endembed\s*%}/g, '');
    return md;
  }

  async loadPage(item) {
    this.setState({ current: item, loading: true, html: '', toc: [] });
    let md;
    if (window.__DOCS && window.__DOCS[item.path] != null) {
      md = window.__DOCS[item.path];
    } else {
      try {
        const res = await fetch('assets/docs/' + item.path);
        md = await res.text();
      } catch (e) { this.setState({ loading: false, html: '<p style="color:#fb7185">Failed to load page.</p>' }); return; }
    }
    md = this.preprocess(md, item);

    const hints = [];
    md = md.replace(/{%\s*hint style="(\w+)"\s*%}([\s\S]*?){%\s*endhint\s*%}/g, (m, style, inner) => {
      const i = hints.length; hints.push({ style, inner: inner.trim() }); return '\n\n@@HINT' + i + '@@\n\n';
    });
    const jsons = [];
    md = md.replace(/```json\n([\s\S]*?)```/g, (m, code) => {
      const i = jsons.length; jsons.push(code.trim()); return '\n\n@@JSON' + i + '@@\n\n';
    });

    await this.ensureMarked();
    let html = window.marked.parse(md);

    const toc = [];
    html = html.replace(/<h([23])[^>]*>([\s\S]*?)<\/h\1>/g, (m, lvl, inner) => {
      const text = this.decode(inner.replace(/<[^>]+>/g, '').trim());
      const id = this.slug(text);
      toc.push({ lvl: +lvl, text, id });
      return '<h' + lvl + ' id="' + id + '">' + inner + '</h' + lvl + '>';
    });

    hints.forEach((h, i) => {
      const inner = window.marked.parse(h.inner);
      const cls = 'callout callout-' + h.style;
      html = html.replace('<p>@@HINT' + i + '@@</p>', '<div class="' + cls + '">' + inner + '</div>');
    });
    jsons.forEach((c, i) => {
      let pretty = c;
      try { pretty = JSON.stringify(JSON.parse(c), null, 2); } catch (e) {}
      const det = '<details class="schema"><summary>OpenAPI schema (JSON)</summary><pre><code>' + this.esc(pretty) + '</code></pre></details>';
      html = html.replace('<p>@@JSON' + i + '@@</p>', det);
    });

    this.setState({ html, toc, loading: false });
    window.scrollTo({ top: 0 });
  }

  navTo(item, ev) { if (ev) ev.preventDefault(); this.loadPage(item); }
  scrollToId(id, ev) {
    if (ev) ev.preventDefault();
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
  }

  renderVals() {
    const cur = this.state.current;
    const curPath = cur ? cur.path : '';
    const q = this.state.q.trim().toLowerCase();

    const groups = this.tree().map(g => ({
      title: g.title,
      items: g.items
        .filter(it => !q || it.label.toLowerCase().includes(q))
        .map(it => {
          const active = it.path === curPath;
          return {
            label: it.label,
            href: 'assets/docs/' + it.path,
            onClick: (ev) => this.navTo(it, ev),
            style: 'display:block; padding:7px 12px; margin:1px 0; border-radius:7px; font-size:14px; text-decoration:none; transition:all 140ms; '
              + (active
                ? 'color:#ecedf3; background:#7c3aed1f; font-weight:600; box-shadow:inset 2px 0 0 #a78bfa;'
                : 'color:#a6acbc;')
          };
        })
    })).filter(g => g.items.length);

    const flat = this.flat();
    const idx = flat.findIndex(it => it.path === curPath);
    const mkAdj = (it) => it ? { label: it.label, href: 'assets/docs/' + it.path, onClick: (ev) => this.navTo(it, ev) } : null;

    const toc = this.state.toc.map(t => ({
      text: t.text,
      href: '#' + t.id,
      onClick: (ev) => this.scrollToId(t.id, ev),
      style: 'display:block; padding:4px 0 4px ' + (t.lvl === 3 ? '14px' : '0') + '; font-size:13px; color:#767c8e; text-decoration:none; line-height:1.4; transition:color 140ms;'
    }));

    return {
      groups,
      q: this.state.q,
      onSearch: (e) => this.setState({ q: e.target.value }),
      loading: this.state.loading,
      crumb: cur ? ('Docs / ' + cur.label) : 'Docs',
      contentEl: React.createElement('div', { className: 'md-body', dangerouslySetInnerHTML: { __html: this.state.html } }),
      toc,
      hasToc: toc.length > 0,
      prev: mkAdj(flat[idx - 1]),
      next: mkAdj(flat[idx + 1])
    };
  }
}
</script>
</body>
</html>
